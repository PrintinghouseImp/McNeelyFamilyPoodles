# Netlify — McNeely Family Poodles (Next.js App Router)
# https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  # Avoid stale Next ISR/prerender edge cases for auth routes
  NEXT_PRIVATE_TARGET = "server"

# Explicit Next.js runtime (OpenNext). Keeps adapter version aligned with deps.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect www → apex (domain: mcneelyfamilypoodles.com)
[[redirects]]
  from = "https://www.mcneelyfamilypoodles.com/*"
  to = "https://mcneelyfamilypoodles.com/:splat"
  status = 301
  force = true

[functions]
  node_bundler = "esbuild"
  # Allow larger photo/medical uploads via Server Actions (plan limits still apply)
  included_files = ["src/generated/prisma/**"]
